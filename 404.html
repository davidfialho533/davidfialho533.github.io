<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada | David Fialho</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .error-message {
      color: var(--text-muted);
      margin: 1rem 0 2rem;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <p class="error-code">404</p>
      <h1>Página não encontrada</h1>
      <p class="error-message">O endereço que você acessou não existe neste site.</p>
      <a href="index.html" class="btn btn-primary">Voltar ao portfólio</a>
    </div>
  </div>
</body>
</html>
